<title>타다 드라이버앱 v2 프로토타입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css"/>
<style>
:root{--font-sans:'Spoqa Han Sans Neo','Noto Sans KR',sans-serif;--color-background-primary:#12151b;--color-background-secondary:#171a21;--color-text-primary:#e8eaed;--color-text-secondary:#9aa3b2;--color-border-secondary:#2a3140;--color-text-info:#32A2FA;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#101A3D;font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
/* ===== 기기(반응형): 모바일은 화면 꽉 채움 ===== */
#ph{--navy:#101A3D;--navy2:#19254D;--navyL:#283873;--navy700:#293F71;--blue700:#0074D7;--cobalt:#0055FF;--blue:#32A2FA;--b300:#5CB4FA;--red:#FE4C00;--lemon:#EEFF00;--e6:#E6E9EF;--ef:#EFEFF1;--dim:#99A5C0;--n1:#C0C8D9;--green:#3CCB41;--amber:#FFA825;--off:#F5F6F7;--ink:#171A24;--bd:#E3E4E8;--ok:#2FA76A;--fs:1;--fsd:calc(1 + (var(--fs,1) - 1)*.6);--fsx:calc(1 + (var(--fs,1) - 1)*.4);--sheet-max:calc(66% + (var(--fs,1) - 1) * 22%);position:fixed;inset:0;width:100%;height:100dvh;background:var(--navy);overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
/* ===== 데스크톱: 가운데 폰 프레임 ===== */
@media (min-width:600px){
  html,body{background:#0a0d12;}
  body{display:flex;align-items:center;justify-content:center;}
  #ph{position:relative;inset:auto;flex:none;width:min(392px,96vw);height:min(848px,94dvh);border:9px solid #05070c;border-radius:44px;box-shadow:0 26px 72px rgba(0,0,0,.6);}
  /* ⚙ 조정버튼·패널을 뷰포트가 아닌 가운데 폰 프레임 우하단에 앵커 */
  body .devbtn{left:calc(50% - 174px);top:calc(50% - min(424px,47dvh) + 96px);right:auto;bottom:auto;}
  body .devpanel{left:calc(50% - 174px);top:calc(50% - min(424px,47dvh) + 148px);right:auto;bottom:auto;}
}
/* ===== 프로토타입 설정(햄버거) ===== */
.devbtn{position:fixed;left:14px;top:calc(env(safe-area-inset-top,0px) + 88px);width:44px;height:44px;border-radius:50%;background:rgba(16,26,45,.72);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#dfe6f2;display:flex;align-items:center;justify-content:center;font-size:21px;z-index:120;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.45);user-select:none;}
.devbtn:active{filter:brightness(1.18)}
.devscrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:118;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.devscrim.open{opacity:1;pointer-events:auto;}
.devpanel{position:fixed;left:14px;top:calc(env(safe-area-inset-top,0px) + 140px);width:min(292px,86vw);background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:16px;padding:14px;z-index:121;display:flex;flex-direction:column;gap:12px;box-shadow:0 16px 44px rgba(0,0,0,.55);transform:translateY(-8px) scale(.98);opacity:0;pointer-events:none;transform-origin:top left;transition:opacity .18s ease,transform .18s ease;}
.devpanel.open{opacity:1;pointer-events:auto;transform:none;}
.devhd{display:flex;justify-content:space-between;align-items:center;color:var(--color-text-primary);font-size:13px;font-weight:700;}
.devx{color:var(--color-text-secondary);cursor:pointer;font-size:15px;padding:2px 8px;margin:-2px -6px;}
.ctl{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.ctl .lbl{font-size:12px;color:var(--color-text-secondary);min-width:62px;}
.fb{font-size:13px;padding:7px 13px;border-radius:9px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);cursor:pointer;background:var(--color-background-primary)}.fb.on{background:#32A2FA;color:#fff;border-color:transparent}
/* ===== 앱 내부 UI =====
   타입 체계: 콘텐츠=SP(calc * --fs, base 18sp) / OS·외부(상태바·T맵)=DP(고정).
   스케일: Display 26 · Title 24 · Headline 20 · Body 18(base) · Label 15 · Caption 13, Weight Reg400/Bold700 */
.sb{flex:none;display:flex;justify-content:space-between;align-items:center;padding:9px 18px 3px;color:#fff;font-size:11px;background:#000}
.appbar{flex:none;display:flex;gap:8px;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--navy)}
.mbtn{width:calc(40px * var(--fsx));height:calc(40px * var(--fsx));display:flex;align-items:center;justify-content:center;color:var(--n1);cursor:pointer;flex:0 0 auto}
.abr{display:flex;gap:8px;align-items:center}
.achip{display:flex;align-items:center;gap:6px;background:rgba(35,53,101,.8);color:var(--ef);font-size:calc(15px * var(--fsx));font-weight:700;padding:8px 10px;border-radius:8px;white-space:nowrap}
.achip.lm{color:rgba(238,255,0,.75)}.achip .ld{width:8px;height:8px;border-radius:50%;background:var(--lemon)}
.body{flex:1 1 auto;position:relative;min-height:0;overflow:hidden;background:#E7ECF0}
.map{position:absolute;inset:0;background:#E7ECF0;cursor:pointer}
.pin{position:absolute;transform:translate(-50%,-88%);z-index:1}
.mk{width:38px;height:39.5px;display:block;filter:drop-shadow(0 2px 2px rgba(10,16,36,.32))}
.carsvg{width:24px;height:31px;display:block;filter:drop-shadow(0 2px 3px rgba(10,16,36,.3))}
svg.i{fill:currentColor}svg.is{fill:none;stroke:currentColor}
.mbtn svg{width:calc(22px * var(--fsx));height:calc(22px * var(--fsx))}
.achip svg{width:calc(17px * var(--fsx));height:calc(17px * var(--fsx));flex:none}
.dot{min-width:44px;height:30px;padding:0 7px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.dot.org{background:var(--blue700)}.dot.way{background:var(--navyL)}.dot.cur{background:var(--blue700);box-shadow:0 0 0 3px rgba(0,116,215,.35),0 1px 3px rgba(0,0,0,.35)}.dot.dest{background:var(--red)}.dot.done{background:#1f6d3e}

.bub svg{width:calc(20px * var(--fsx));height:calc(20px * var(--fsx))}
.bub.pay{background:var(--navy700)}.bub.pay .bin{background:transparent;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.bubw{position:relative;display:flex}
.bubdot{position:absolute;top:calc(-7px * var(--fsx));right:calc(-7px * var(--fsx));min-width:calc(20px * var(--fsx));height:calc(20px * var(--fsx));padding:0 calc(5px * var(--fsx));box-sizing:border-box;border-radius:999px;background:var(--red);color:#fff;font-size:calc(12px * var(--fsx));font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);z-index:6}
.bub.grad{background:var(--navy700)}.bub.chg{background:var(--navy700)}.bub.nav{background:var(--blue700)}
.toast{position:absolute;left:50%;bottom:16%;transform:translate(-50%,10px);max-width:90%;white-space:nowrap;background:rgba(13,20,44,.96);color:#fff;font-size:calc(15px * var(--fs,1));font-weight:600;line-height:1.35;text-align:center;padding:calc(11px * var(--fs,1)) 22px;border-radius:24px;box-shadow:0 12px 32px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);z-index:45;opacity:0;transition:opacity .2s ease,transform .24s ease;pointer-events:none}

.prow{display:flex;align-items:center;gap:calc(10px * var(--fsx));padding:0 calc(5px * var(--fsx))}
.pav{width:calc(28px * var(--fsx));height:calc(28px * var(--fsx));flex:0 0 auto}.pav svg{width:100%;height:100%;display:block}
.pnm{flex:1;min-width:0;font-size:calc(24px * var(--fsd));font-weight:700;color:var(--e6);word-break:keep-all;overflow-wrap:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.preq{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:calc(16px * var(--fsx));cursor:pointer}.preq .chev{display:inline-flex;color:var(--dim)}.preq .chev svg{width:calc(8px * var(--fsx));height:calc(13px * var(--fsx));display:block}
/* 확대(tight) 시 승객카드 축약: 요청사항 행 접기(정체성 행=이름·전화만 유지). 케이스 무관—행이 없으면 자동으로 이미 컴팩트 */
#ph.tight .preq{display:none}
.route{flex:1 1 auto;background:var(--navy);border-radius:12px 12px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.28);display:flex;flex-direction:column;gap:0;padding:calc(6px * var(--fsx)) 0 calc(14px * var(--fsx));min-height:0;overflow:hidden}
.route.lead{padding-top:calc(6px * var(--fsx))}
.rhd{flex:0 0 auto;display:flex;align-items:center;gap:calc(12px * var(--fsx));padding:calc(8px * var(--fsx)) calc(16px * var(--fsx))}
.rhd .t{font-size:calc(15px * var(--fsx));font-weight:400;color:var(--dim);white-space:nowrap}
.rhd .see{margin-left:auto;color:var(--b300);font-size:calc(15px * var(--fsx));white-space:nowrap;cursor:pointer}
.plist{flex:1 1 auto;display:flex;flex-direction:column;gap:4px;overflow-y:auto;min-height:0}

.badge.org{background:var(--blue700)}.badge.way{background:var(--navy700)}.badge.dest{background:var(--red)}
.irow{flex:0 0 auto;display:flex;align-items:flex-start;gap:calc(16px * var(--fsx));padding:calc(12px * var(--fsx)) calc(20px * var(--fsx));overflow:hidden}
.irow .nm{flex:1;min-width:0;font-size:calc(20px * var(--fs,1));font-weight:700;line-height:calc(30px * var(--fsx));color:var(--dim);word-break:normal;overflow-wrap:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}

.caddr{font-size:calc(16px * var(--fs,1));color:var(--n1);line-height:1.35;word-break:keep-all;overflow-wrap:break-word}
.cnav{width:calc(24px * var(--fsx));height:calc(24px * var(--fsx));flex:0 0 auto;margin-top:6px;cursor:pointer}.cnav svg{width:100%;height:100%;fill:#fff}
.cnavrow{display:flex;align-items:flex-start;gap:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:8px;padding:2px 6px;margin:-2px -6px;transition:background .1s ease}.cnavrow .cname{flex:1;transition:filter .1s ease}.cnavrow:active{background:rgba(255,255,255,.07)}.cnavrow:active .cname{filter:brightness(1.2)}.cnavrow:active .cnav{transform:scale(.74);filter:brightness(1.4)}
.cbtn{flex:0 0 auto;min-height:clamp(68px, calc(48px + 20px * var(--fs,1)), 78px);display:flex;align-items:center;justify-content:center;gap:calc(10px * var(--fsx));padding:calc(10px * var(--fsx)) calc(16px * var(--fsx));font-size:calc(20px * var(--fs,1));font-weight:700;cursor:pointer;white-space:nowrap;position:relative;overflow:hidden;transition:filter .12s ease;-webkit-tap-highlight-color:transparent;user-select:none}.cbtn:active{filter:brightness(.86)}

/* ── 탭 피드백(차량 거치용: 명확한 프레스 + 리플 + 햅틱) ── */

.fsc.done .n{color:var(--green)}.fsc.unc .n{color:var(--amber)}
.paywrap{flex:1;display:flex;flex-direction:column;padding:8px 16px 8px;color:#fff}.payhd{font-size:calc(18px * var(--fs,1));font-weight:700;padding:12px 4px 16px;color:var(--ef)}.payrow{display:flex;justify-content:space-between;align-items:center;padding:15px 4px;border-bottom:1px solid var(--navyL);font-size:calc(18px * var(--fs,1));color:var(--dim)}.payrow b{color:#fff;font-size:calc(20px * var(--fs,1))}.paywarn{display:flex;gap:6px;color:#FE6F59;font-size:calc(13px * var(--fs,1));margin-top:16px}
.donew{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;color:#fff;text-align:center}.dok{color:var(--green);font-size:calc(13px * var(--fs,1));margin-bottom:14px}.dbig{font-size:calc(24px * var(--fs,1));font-weight:700;margin-bottom:6px}.dsub{font-size:calc(13px * var(--fs,1));color:var(--dim);margin-bottom:26px}.dcirc{width:150px;height:150px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:calc(18px * var(--fs,1));font-weight:700;margin-bottom:24px;line-height:1.3}.drest{color:var(--dim);font-size:calc(13px * var(--fs,1));border:1px solid var(--navyL);padding:10px 18px;border-radius:20px;cursor:pointer}
.cov{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:40}.cbox{background:var(--navy2);border-radius:16px;padding:22px;width:264px;text-align:center}.ctit{color:#fff;font-size:calc(18px * var(--fs,1));font-weight:700;margin-bottom:9px;line-height:1.35}.cdsc{color:var(--dim);font-size:calc(13px * var(--fs,1));margin-bottom:18px;line-height:1.5}.cdsc b{color:var(--amber)}.cbs{display:flex;gap:10px}.cb{flex:1;padding:13px;border-radius:8px;font-size:calc(15px * var(--fs,1));font-weight:700;cursor:pointer}.cb.no{background:var(--navyL);color:var(--ef)}.cb.yes{background:var(--blue);color:#fff}
/* ── 지도 탭 → 전체 지도(포커스): 시트를 아래로 슬라이드, 앱 상태 변화 시 자동 복귀 ── */
.bottom{transition:transform .42s cubic-bezier(.5,0,0,1)}
#ph.mf .bottom{transform:translateY(106%);pointer-events:none}
.mfexit{position:absolute;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;z-index:7;display:flex;align-items:center;justify-content:center;gap:10px;min-height:clamp(60px, calc(48px + 16px * var(--fs,1)), 66px);padding:0 30px;border-radius:16px;background:rgba(25,37,77,.96);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);border:1.5px solid rgba(92,180,250,.6);color:#fff;font-size:calc(17px * var(--fs,1));font-weight:700;white-space:nowrap;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.5);user-select:none;-webkit-tap-highlight-color:transparent;opacity:0;pointer-events:none;transform:translateX(-50%) translateY(130px);transition:opacity .24s ease,transform .44s cubic-bezier(.18,.84,.3,1) .04s,filter .11s ease}
.mfexit svg{width:calc(20px * var(--fs,1));height:calc(20px * var(--fs,1));stroke:var(--b300);fill:none}
#ph.mf .mfexit{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
#ph.mf .mfexit:active{transform:translateX(-50%) translateY(0) scale(.97);filter:brightness(1.12)}
.mfexit .mfx-txt{display:flex;flex-direction:column;align-items:flex-start;line-height:1.15;gap:1px}
.mfexit .mfx-cap{font-size:calc(12px * var(--fsx));font-weight:600;color:var(--b300);letter-spacing:.2px}
.mfexit .mfx-act{font-size:calc(17px * var(--fs,1));font-weight:700;color:#fff}

<body>
<h2 class="sr-only">타다 드라이버앱 v2 프로토타입 — 운행중 화면. 모바일에서 화면 전체에 반응형으로 표시되고, 프로토타입 설정(경유 개수·글씨 크기)은 우하단 톱니 버튼에 숨겨져 있습니다.</h2>
<div id="ph" style="--fs:1"><div id="app"></div></div>
<button class="devbtn" id="devbtn" aria-label="프로토타입 설정 열기">⚙</button>
<div class="devscrim" id="devscrim"></div>
<div class="devpanel" id="devpanel">
  <div class="devhd"><span>프로토타입 설정</span><span class="devx" id="devx">✕</span></div>
  <div class="ctl"><span class="lbl">경유 개수</span><span class="fb" onclick="P.setWays(0,this)">0</span><span class="fb" onclick="P.setWays(2,this)">2</span><span class="fb on" onclick="P.setWays(3,this)">3</span><span class="fb" onclick="P.setWays(5,this)">5</span></div>
  <div class="ctl"><span class="lbl">글씨(sp)</span><span class="fb on" onclick="P.setFont(1,this)">보통</span><span class="fb" onclick="P.setFont(1.25,this)">크게</span><span class="fb" onclick="P.setFont(1.5,this)">아주 크게</span></div>
  <div class="ctl"><span class="lbl">자동 복귀 데모</span><span class="fb" onclick="P.simEvent()">🔔 알림 수신 시뮬레이션</span></div>
  <div class="ctl"><span class="lbl">화면</span><span class="fb" onclick="P.reset()">↺ 처음부터</span></div>
</div>
<script>
(function(){
  var IC={
    menu:'<svg class="i" viewBox="0 0 24 24"><path d="M0 3H24V5.5H0V3Z"/><path d="M0 10.75H24V13.25H0V10.75Z"/><path d="M24 18.5H0V21H24V18.5Z"/></svg>',
    reserv:'<svg class="is" viewBox="0 0 24 24"><path d="M8.5 7V1.5M15.5 1.5V7M8.67 11.51L10.82 14L15.38 10.59M3.25 4.25H20.75V19.75H3.25V4.25Z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    navi:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#F9F9F9"/><path d="M13.9 19.72L10.65 14.77L4.83 13.66L4.62 12.59L17.36 4.74L14.97 19.51L13.9 19.72Z" fill="#0074D7"/></svg>',
    navarrow:'<svg viewBox="0 0 24 24"><path d="M15 6V1L24 7.5L15 14V10H14C11.19 10 10 11.39 10 15V23H6V15C6 9.3 8.83 6 14 6H15Z"/></svg>',
    person:'<svg viewBox="0 0 28 28"><path fill-rule="evenodd" clip-rule="evenodd" d="M14 28C21.732 28 28 21.732 28 14C28 6.26801 21.732 0 14 0C6.26801 0 0 6.26801 0 14C0 21.732 6.26801 28 14 28ZM16.8039 9.18737C16.8039 10.879 15.4785 12.2497 13.844 12.2497C12.2095 12.2497 10.8842 10.879 10.8842 9.18737C10.8842 7.49578 12.2095 6.125 13.844 6.125C15.4785 6.125 16.8039 7.49578 16.8039 9.18737ZM7 20.125L7.56467 14.5591C7.56467 14.5591 14.1575 13.8218 20.5613 14.4926L21 20.0573L7 20.125Z" fill="#C2CADB"/></svg>',
    phone:'<svg class="i" viewBox="0 0 28 28"><path d="M17.83 17.9L17.19 21.8C17.19 21.8 13.98 20.52 11.44 17.25C8.91 13.98 7.61 9.45 7.61 9.45L11.44 8.8V1H2.5V9.21C2.5 9.8 2.58 10.39 2.77 10.94C3.34 12.62 4.85 16.5 7.61 19.85C9.81 22.52 12.15 24.57 13.66 25.78C14.69 26.61 15.98 27 17.3 27H25.5V17.9H17.83Z"/></svg>',
    next:'<svg class="i" viewBox="0 0 10 16"><path d="M0.625 1.78L7.33 7.89L0.74 13.9L2.07 15.11L9.99 7.89L1.95 0.57L0.625 1.78Z"/></svg>'
  };
  var NAV=IC.navarrow;
  function pinSVG(label,fill,tc){var fs=(label==='✓')?19:(label.length>=3?11:13);return '<svg class="mk" viewBox="0 0 50 52"><ellipse cx="25" cy="46" rx="14" ry="4.5" fill="#0a1024" opacity="0.22"/><path d="M4 0.5H46C47.933 0.5 49.5 2.067 49.5 4V27C49.5 28.933 47.933 30.5 46 30.5H26V45C26 45.55 25.55 46 25 46C24.45 46 24 45.55 24 45V30.5H4C2.067 30.5 0.5 28.933 0.5 27V4C0.5 2.067 2.067 0.5 4 0.5Z" fill="'+fill+'" stroke="rgba(0,0,0,.14)"/><text x="25" y="15.8" text-anchor="middle" dominant-baseline="central" font-family="SpoqaHanSans,sans-serif" font-weight="700" font-size="'+fs+'" fill="'+tc+'">'+label+'</text></svg>';}
  function pinFor(i){var s=stops[i],fill,label;if(isDone(i)){fill='#2E7D52';label='✓';}else if(s.t==='origin'){fill='#0074D7';label='출발';}else if(s.t==='dest'){fill='#FE4C00';label='도착';}else if(i===nextArmed()){fill='#0074D7';label='경유'+s.n;}else{fill='#556895';label='경유'+s.n;}return pinSVG(label,fill,'#fff');}
  function carSVG(){return '<svg class="carsvg" viewBox="0 0 26 34"><ellipse cx="13" cy="30.5" rx="8.5" ry="2.8" fill="#0a1024" opacity="0.2"/><rect x="3.5" y="1.5" width="19" height="29" rx="7.5" fill="#fff" stroke="rgba(0,0,0,.15)"/><path d="M6.6 10.6C10.4 8.5 15.6 8.5 19.4 10.6L18.3 15C15 13.5 11 13.5 7.7 15L6.6 10.6Z" fill="#26365F"/><rect x="7.6" y="18" width="10.8" height="8.5" rx="2.5" fill="#3C4E77"/></svg>';}
  var origin={t:'origin',name:'위워크 삼성역점',addr:'서울 강남구 청담동 92-18',short:'삼성역'};
  var dest={t:'dest',name:'뚝섬역 1번 출구',addr:'서울 성동구 성수동1가 685',short:'뚝섬역'};
  var POOL=[
    {name:'AUCOMMERCE',addr:'서울 성동구 성수동 2가 301-94',short:'AUCOMMERCE'},
    {name:'성수역 4번 출구',addr:'서울 성동구 성수동 1가',short:'성수역'},
    {name:'갤러리아 포레',addr:'서울 성동구 성수동1가 685',short:'갤러리아'},
    {name:'아크로 서울포레스트',addr:'서울 성동구 성수동1가 547',short:'아크로'},
    {name:'성수연방',addr:'서울 성동구 성수동2가 333-13',short:'성수연방'}
  ];
  var stops,PCT,WAYS,S;
  function build(n){WAYS=n;stops=[origin];for(var i=0;i<n;i++){var p=POOL[i];stops.push({t:'way',n:i+1,name:p.name,addr:p.addr,short:p.short})}stops.push(dest);var K=stops.length;PCT=[];for(var i=0;i<K;i++){var t=(K<=1)?0:i/(K-1);PCT.push([Math.round(14+(88-14)*t),Math.round(64-(64-16)*t)])}}
  function resetState(){S={screen:'pickup',pphase:'go',phase:'go',done:[],uncertain:[],target:null,lastAt:0,confirm:null,busy:false,collapsed:false,_last:''}}
  function clearMF(){S.collapsed=false;var ph=document.getElementById('ph');if(ph)ph.classList.remove('mf')}
  function isDone(i){return S.done.indexOf(i)>-1}
  function isUnc(i){return S.uncertain.indexOf(i)>-1}
  function nextArmed(){for(var i=1;i<stops.length;i++){if(!isDone(i)&&!isUnc(i))return i}return stops.length-1}
  function bt(s){return s.t==='origin'?'출발지':s.t==='dest'?'도착지':('경유'+s.n)}
  function bcls(s,focus){return s.t==='dest'?'dest':(focus?'org':'way')}
  function routePath(){var d='M'+PCT[0][0]+' '+PCT[0][1];for(var i=1;i<PCT.length;i++)d+=' L'+PCT[i][0]+' '+PCT[i][1];return d}
  function mapBg(){return '<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%"><rect width="100" height="100" fill="#E7ECF0"/><rect x="0" y="30" width="100" height="7" fill="#fff" opacity="0.85"/><rect x="44" y="0" width="5" height="100" fill="#fff" opacity="0.8"/><rect x="10" y="40" width="26" height="18" fill="#DCEAD7" opacity="0.7"/></svg>'}
  function sb(){return '<div class="sb"><span>12:45</span><span>· · · ·  100%</span></div>'}
  function appbar(resv){return '<div class="appbar"><div class="mbtn">'+IC.menu+'</div><div class="abr"><span class="achip lm"><span class="ld"></span> 미리배차 켜짐</span></div></div>'}
  function passenger(basic){var req=basic?'':'<div class="preq">고객 요청사항 보기 <span class="chev">'+IC.next+'</span></div>';return '<div class="pinfo"><div class="pcard"><div class="prow"><span class="pav">'+IC.person+'</span><span class="pnm">김지혜</span><span class="pcall">'+IC.phone+'</span></div>'+req+'</div></div>'}
  function dotc(i){return '<div class="pin" style="left:'+PCT[i][0]+'%;top:'+PCT[i][1]+'%">'+pinFor(i)+'</div>'}
  function markers(){var h='';for(var i=0;i<stops.length;i++)h+=dotc(i);h+='<div class="car" style="left:'+PCT[S.lastAt][0]+'%;top:'+PCT[S.lastAt][1]+'%">'+carSVG()+'</div>';return h}
  function navArrowSVG(){return '<svg class="navarr" viewBox="0 0 40 40"><circle cx="20" cy="21" r="17" fill="#3B8BEA" opacity="0.16"/><path d="M20 5 L31 32 Q20 26 9 32 Z" fill="#1E6FE0" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/></svg>';}
  function tmapMap(d){var cx=34,cy=76,px=50,py=20;return '<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%"><rect width="100" height="100" fill="#E7ECF0"/><rect x="0" y="33" width="100" height="7" fill="#fff" opacity="0.85"/><rect x="46" y="0" width="5" height="100" fill="#fff" opacity="0.8"/><rect x="8" y="46" width="26" height="18" fill="#DCEAD7" opacity="0.7"/><path d="M'+cx+' '+cy+' L'+px+' '+py+'" stroke="#2E7CE0" stroke-width="6" vector-effect="non-scaling-stroke" fill="none" stroke-linecap="round" opacity="0.92"/></svg><div class="pin" style="left:'+px+'%;top:'+py+'%">'+pinFor(d)+'</div><div class="navp" style="left:'+cx+'%;top:'+cy+'%"><span class="nv">'+navArrowSVG()+'</span></div>';}
  function turnArrowSVG(){return '<svg viewBox="0 0 32 32" fill="none"><path d="M8 27 V15.5 A4.5 4.5 0 0 1 12.5 11 H20 M15.5 6.5 L21 11 L15.5 15.5" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
  function tbt(dist,road,next){return '<div class="tbt"><div class="tbt-a">'+turnArrowSVG()+'</div><div class="tbt-m"><div class="tbt-d">'+dist+'<em>m</em></div><div class="tbt-r">'+road+'</div></div><div class="tbt-n"><span class="tbt-ni">↑</span><b>'+next+'m</b></div></div>';}
  function tovr(retCall,pay){return '<div class="tovr"><div class="tovb tada" onclick="'+retCall+'"><span class="tlogo">tada</span><span class="trun">운행중</span></div><div class="tovb chg" onclick="P.changeRoute()">경로<br>변경</div>'+(pay?'<div class="tovb pay" onclick="P.pay()"><span class="ppin">결제</span></div>':'')+'</div>';}
  function tspeed(){return '<div class="tspeed"><div class="tsl">50</div><div class="tcur">48<em>km/h</em></div></div>';}
  function tbar(eta,dist,arr,name){return '<div class="tbar"><div class="tb-info"><b>'+eta+'</b><span>'+dist+' · '+arr+' · '+name+'</span></div><div class="tb-x">✕</div></div>';}
  function bubbles(pay){var h='';if(pay)h+='<div class="bub pay"><div class="bin">결제</div></div>';h+='<span class="bubw"><div class="bub grad">예약</div><span class="bubdot">3</span></span><div class="bub chg">경로<br>변경</div><div class="bub nav">'+IC.navi+'<span>내비</span></div>';return '<div class="bubs">'+h+'</div>'}
  function cardHTML(s,o){var bicon=(o.btnCls==='go')?'<span class="cbi">'+NAV+'</span>':'';var nameBlock=o.nav?('<div class="cnavrow" onclick="'+o.navClick+'"><div class="cname">'+s.name+'</div><span class="cnav">'+NAV+'</span></div>'):('<div class="cname">'+s.name+'</div>');return '<div class="crd"><div class="crd-top"><span class="badge '+bcls(s,true)+'">'+bt(s)+'</span><div class="cinfo">'+nameBlock+'<div class="caddr">'+s.addr+'</div></div></div><div class="cbtn '+o.btnCls+'" onclick="'+o.btnClick+'">'+bicon+o.label+'</div></div>'}
  function goCard(i){return cardHTML(stops[i],{btnCls:'go',label:'경로 안내받기',btnClick:'P.startNav()',nav:false})}
  function irow(i,navOn){var s=stops[i];var oc=navOn?('P.askGo('+i+')'):"P.toast('아직 안내할 수 없습니다')";return '<div class="irow tap'+(navOn?' on':'')+'" onclick="'+oc+'"><span class="badge '+bcls(s,navOn)+'">'+bt(s)+'</span><div class="nm">'+s.name+'</div><span class="rnav'+(navOn?' on':'')+'">'+NAV+'</span></div>'}
  function mfExit(){return '<div class="mfexit" onclick="P.mapExit()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4v5H4M20 9h-5V4M15 20v-5h5M4 15h5v5"/></svg><span class="mfx-txt"><span class="mfx-cap">지도 확대함</span><span class="mfx-act">지도 축소하기</span></span></div>'}
  function shell(mapInner,bottomInner,resv){return sb()+appbar(resv)+'<div class="body"><div class="map" onclick="P.mapTap(event)">'+mapInner+'</div><div class="bottom">'+bottomInner+'</div>'+mfExit()+'</div>'}
