<!DOCTYPE html>
<html lang="ko">
<head>

<title>타다 드라이버앱 v2 프로토타입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css"/>
<style>
:root{--font-sans:'Spoqa Han Sans Neo','Noto Sans KR',sans-serif;--color-background-primary:#12151b;--color-background-secondary:#171a21;--color-text-primary:#e8eaed;--color-text-secondary:#9aa3b2;--color-border-secondary:#2a3140;--color-text-info:#32A2FA;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#101A3D;font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
/* ===== 기기(반응형): 모바일은 화면 꽉 채움 ===== */
#ph{--navy:#101A3D;--navy2:#19254D;--navyL:#283873;--navy700:#293F71;--blue700:#0074D7;--cobalt:#0055FF;--blue:#32A2FA;--b300:#5CB4FA;--red:#FE4C00;--lemon:#EEFF00;--e6:#E6E9EF;--ef:#EFEFF1;--dim:#99A5C0;--off:#F5F6F7;--ink:#171A24;--bd:#E3E4E8;--ok:#2FA76A;--fs:1;position:fixed;inset:0;width:100%;height:100dvh;background:var(--navy);overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
/* ===== 데스크톱: 가운데 폰 프레임 ===== */
@media (min-width:600px){
  html,body{background:#0a0d12;}
  body{display:flex;align-items:center;justify-content:center;}
  #ph{position:relative;inset:auto;flex:none;width:min(392px,96vw);height:min(848px,94dvh);border:9px solid #05070c;border-radius:44px;box-shadow:0 26px 72px rgba(0,0,0,.6);}
}
/* ===== 프로토타입 설정(햄버거) ===== */
.devbtn{position:fixed;right:14px;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);width:44px;height:44px;border-radius:50%;background:rgba(16,26,45,.72);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#dfe6f2;display:flex;align-items:center;justify-content:center;font-size:21px;z-index:120;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.45);user-select:none;}
.devbtn:active{filter:brightness(1.18)}
.devscrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:118;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.devscrim.open{opacity:1;pointer-events:auto;}
.devpanel{position:fixed;right:14px;bottom:calc(env(safe-area-inset-bottom,0px) + 66px);width:min(292px,86vw);background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);border-radius:16px;padding:14px;z-index:121;display:flex;flex-direction:column;gap:12px;box-shadow:0 16px 44px rgba(0,0,0,.55);transform:translateY(8px) scale(.98);opacity:0;pointer-events:none;transform-origin:bottom right;transition:opacity .18s ease,transform .18s ease;}
.devpanel.open{opacity:1;pointer-events:auto;transform:none;}
.devhd{display:flex;justify-content:space-between;align-items:center;color:var(--color-text-primary);font-size:13px;font-weight:700;}
.devx{color:var(--color-text-secondary);cursor:pointer;font-size:15px;padding:2px 8px;margin:-2px -6px;}
.ctl{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.ctl .lbl{font-size:12px;color:var(--color-text-secondary);min-width:62px;}
.fb{font-size:13px;padding:7px 13px;border-radius:9px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);cursor:pointer;background:var(--color-background-primary)}.fb.on{background:#32A2FA;color:#fff;border-color:transparent}
/* ===== 앱 내부 UI =====
   타입 체계: 콘텐츠=SP(calc * --fs, base 18sp) / OS·외부(상태바·T맵)=DP(고정).
   스케일: Display 26 · Title 24 · Headline 20 · Body 18(base) · Label 15 · Caption 13, Weight Reg400/Bold700 */
.sb{flex:none;display:flex;justify-content:space-between;align-items:center;padding:9px 18px 3px;color:#fff;font-size:11px;background:#000}
.appbar{flex:none;display:flex;gap:8px;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--navy)}
.mbtn{width:calc(40px * var(--fs,1));height:calc(40px * var(--fs,1));display:flex;align-items:center;justify-content:center;color:#cdd6e6;font-size:calc(20px * var(--fs,1));cursor:pointer;flex:0 0 auto}
.abr{display:flex;gap:8px;align-items:center}

.achip.lm{color:var(--lemon)}.achip .ld{width:8px;height:8px;border-radius:50%;background:var(--lemon)}
.body{flex:1 1 auto;position:relative;min-height:0;overflow:hidden;background:#E7ECF0}
.map{position:absolute;inset:0;background:#E7ECF0}
.pin{position:absolute;transform:translate(-50%,-88%);z-index:1}
.mk{width:38px;height:39.5px;display:block;filter:drop-shadow(0 2px 2px rgba(10,16,36,.32))}

svg.i{fill:currentColor}svg.is{fill:none;stroke:currentColor}
.mbtn svg{width:calc(22px * var(--fs,1));height:calc(22px * var(--fs,1))}
.achip svg{width:calc(17px * var(--fs,1));height:calc(17px * var(--fs,1));flex:none}
.dot{min-width:44px;height:30px;padding:0 7px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35)}

.car{position:absolute;transform:translate(-50%,-50%);z-index:2}

.bub svg{width:calc(23px * var(--fs,1));height:calc(23px * var(--fs,1))}
.bub.pay{background:var(--navy2);border-color:var(--b300);padding:5px}.bub.pay .bin{background:var(--cobalt);border:1px solid #3385ff;border-radius:8px;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.bub.grad{background:linear-gradient(var(--navy2),var(--navyL))}.bub.chg{background:var(--navyL)}.bub.nav{background:#0044A6}
.toast{position:absolute;left:50%;bottom:16%;transform:translate(-50%,10px);max-width:90%;white-space:nowrap;background:rgba(13,20,44,.96);color:#fff;font-size:calc(15px * var(--fs,1));font-weight:600;line-height:1.35;text-align:center;padding:calc(11px * var(--fs,1)) 22px;border-radius:24px;box-shadow:0 12px 32px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);z-index:45;opacity:0;transition:opacity .2s ease,transform .24s ease;pointer-events:none}
.toast.on{opacity:1;transform:translate(-50%,0)}

.prow{display:flex;align-items:center;gap:10px;padding:0 5px}
.pav{width:calc(28px * var(--fs,1));height:calc(28px * var(--fs,1));flex:0 0 auto}.pav svg{width:100%;height:100%;display:block}
.pnm{flex:1;min-width:0;font-size:calc(24px * var(--fs,1));font-weight:700;color:var(--ef);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcall{color:#e6ecf7;padding:0 8px 0 25px;cursor:pointer;display:flex;align-items:center}.pcall svg{width:calc(24px * var(--fs,1));height:calc(24px * var(--fs,1));display:block}
.preq{background:var(--navy700);border-radius:8px;padding:10px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ef);font-size:calc(18px * var(--fs,1));cursor:pointer}.preq .chev{display:inline-flex;color:var(--dim)}.preq .chev svg{width:calc(8px * var(--fs,1));height:calc(13px * var(--fs,1));display:block}
.route{flex:1 1 auto;background:var(--navy);border-radius:12px 12px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.28);display:flex;flex-direction:column;gap:8px;padding:calc(6px * var(--fs,1)) 12px calc(12px * var(--fs,1));min-height:0;overflow:hidden}
.rhd{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:calc(12px * var(--fs,1)) 16px}
.rhd .t{font-size:calc(18px * var(--fs,1));font-weight:700;color:var(--e6);white-space:nowrap}
.rhd .see{margin-left:auto;color:var(--b300);font-size:calc(20px * var(--fs,1));white-space:nowrap;cursor:pointer}
.plist{flex:1 1 auto;display:flex;flex-direction:column;gap:2px;overflow-y:auto;min-height:0}
.badge{width:calc(56px * var(--fs,1));min-height:calc(32px * var(--fs,1));border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:calc(18px * var(--fs,1));font-weight:700;color:var(--e6);flex:0 0 auto;white-space:nowrap}
.badge.org{background:var(--blue700)}.badge.way{background:var(--navy700)}.badge.dest{background:var(--red)}
.irow{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:calc(12px * var(--fs,1)) 16px;overflow:hidden}
.irow .nm{flex:1;min-width:0;font-size:calc(20px * var(--fs,1));font-weight:700;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.irow.tap{cursor:pointer}.irow.tap:active{background:rgba(255,255,255,.04)}
.rnav{width:calc(24px * var(--fs,1));height:calc(24px * var(--fs,1));flex:0 0 auto;opacity:.3;padding:0}
.rnav.on{opacity:1}.rnav svg{width:100%;height:100%;fill:#cdd6e6}
.crd{flex:0 0 auto;border:1px solid var(--bd);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;will-change:transform,opacity,max-height}
.crd-top{display:flex;align-items:flex-start;gap:15px;padding:16px;background:var(--navy)}
.crd-top .badge{margin-top:4px}
.cinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.cname{font-size:calc(26px * var(--fs,1));font-weight:700;color:#fff;line-height:1.32;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.caddr{font-size:calc(18px * var(--fs,1));color:var(--ef);line-height:1.35}
.cnav{width:calc(24px * var(--fs,1));height:calc(24px * var(--fs,1));flex:0 0 auto;margin-top:6px;cursor:pointer}.cnav svg{width:100%;height:100%;fill:#fff}
.cbtn{flex:0 0 auto;min-height:calc(56px * var(--fs,1));display:flex;align-items:center;justify-content:center;gap:10px;padding:calc(15px*var(--fs,1)) 16px;font-size:calc(20px * var(--fs,1));font-weight:700;cursor:pointer;white-space:nowrap}.cbtn:active{filter:brightness(.97)}
.cbtn.go{background:var(--off);color:var(--ink)}
.cbtn.done{background:var(--blue);color:#fff}
.cbtn.ok{background:var(--ok);color:#fff}
.barfull{flex:none;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:calc(64px*var(--fs,1));padding:calc(20px * var(--fs,1)) 16px;background:var(--blue);color:#fff;font-size:calc(20px * var(--fs,1));font-weight:700;white-space:nowrap;cursor:pointer}.barfull:active{filter:brightness(.96)}
.tnav{flex:none;display:flex;align-items:center;gap:10px;padding:13px 16px;background:#0b6b3a;color:#fff}.tn-a{font-size:24px}.tn-d{font-size:20px;font-weight:700}.tn-r{font-size:11px;opacity:.9;margin-top:2px}.tn-t{margin-left:auto;font-size:9px;border:1px solid rgba(255,255,255,.5);padding:2px 6px;border-radius:4px}
.tmapmap{flex:1 1 auto;min-height:0;position:relative;background:#ECEFF2}
.tbar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:13px 17px;background:var(--navy);color:#cdd6e6;font-size:13px;font-weight:600}
.tovr{position:absolute;right:12px;top:14px;display:flex;flex-direction:column;gap:8px;z-index:3}.tob{min-width:54px;padding:9px 6px;border-radius:14px;background:var(--navyL);color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:1.15}.tob.tada{background:var(--blue);cursor:pointer}
.ttip{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:rgba(16,26,61,.95);color:#cdd6e6;font-size:11px;padding:6px 12px;border-radius:20px;white-space:nowrap;z-index:3}.ttip b{color:var(--b300)}
.full{flex:1;display:flex;flex-direction:column;background:var(--navy);min-height:0}
.fhd{flex:none;display:flex;align-items:center;justify-content:space-between;padding:16px 14px 12px;color:#fff;font-size:calc(20px * var(--fs,1));font-weight:700}
.fsum{display:flex;gap:8px;padding:0 16px 12px}
.fsc{flex:1;background:var(--navy2);border-radius:8px;padding:10px;text-align:center}.fsc .n{font-size:calc(24px * var(--fs,1));font-weight:700}.fsc .l{font-size:calc(13px * var(--fs,1));color:var(--dim);margin-top:2px}
.fsc.done .n{color:var(--b300)}.fsc.unc .n{color:#f2a33c}
.paywrap{flex:1;display:flex;flex-direction:column;padding:8px 16px 8px;color:#fff}.payhd{font-size:calc(18px * var(--fs,1));font-weight:700;padding:12px 4px 16px;color:var(--ef)}.payrow{display:flex;justify-content:space-between;align-items:center;padding:15px 4px;border-bottom:1px solid var(--navyL);font-size:calc(18px * var(--fs,1));color:var(--dim)}.payrow b{color:#fff;font-size:calc(20px * var(--fs,1))}.paywarn{display:flex;gap:6px;color:#ff8a6b;font-size:calc(13px * var(--fs,1));margin-top:16px}
.donew{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;color:#fff;text-align:center}.dok{color:#7fd6a0;font-size:calc(13px * var(--fs,1));margin-bottom:14px}.dbig{font-size:calc(24px * var(--fs,1));font-weight:700;margin-bottom:6px}.dsub{font-size:calc(13px * var(--fs,1));color:var(--dim);margin-bottom:26px}.dcirc{width:150px;height:150px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:calc(18px * var(--fs,1));font-weight:700;margin-bottom:24px;line-height:1.3}.drest{color:var(--dim);font-size:calc(13px * var(--fs,1));border:1px solid var(--navyL);padding:10px 18px;border-radius:20px;cursor:pointer}
.cov{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:40}.cbox{background:var(--navy2);border-radius:16px;padding:22px;width:264px;text-align:center}.ctit{color:#fff;font-size:calc(18px * var(--fs,1));font-weight:700;margin-bottom:9px;line-height:1.35}.cdsc{color:var(--dim);font-size:calc(13px * var(--fs,1));margin-bottom:18px;line-height:1.5}.cdsc b{color:#f2a33c}.cbs{display:flex;gap:10px}.cb{flex:1;padding:13px;border-radius:8px;font-size:calc(15px * var(--fs,1));font-weight:700;cursor:pointer}.cb.no{background:var(--navyL);color:var(--ef)}.cb.yes{background:var(--blue);color:#fff}
</style>

<body>
<h2 class="sr-only">타다 드라이버앱 v2 프로토타입 — 운행중 화면. 모바일에서 화면 전체에 반응형으로 표시되고, 프로토타입 설정(경유 개수·글씨 크기)은 우하단 톱니 버튼에 숨겨져 있습니다.</h2>
<div id="ph" style="--fs:1"><div id="app"></div></div>
<button class="devbtn" id="devbtn" aria-label="프로토타입 설정 열기">⚙</button>
<div class="devscrim" id="devscrim"></div>
<div class="devpanel" id="devpanel">
  <div class="devhd"><span>프로토타입 설정</span><span class="devx" id="devx">✕</span></div>
  <div class="ctl"><span class="lbl">경유 개수</span><span class="fb" onclick="P.setWays(2,this)">2</span><span class="fb on" onclick="P.setWays(3,this)">3</span><span class="fb" onclick="P.setWays(5,this)">5</span></div>
  <div class="ctl"><span class="lbl">글씨(sp)</span><span class="fb on" onclick="P.setFont(1,this)">보통</span><span class="fb" onclick="P.setFont(1.25,this)">크게</span><span class="fb" onclick="P.setFont(1.5,this)">아주 크게</span></div>
  <div class="ctl"><span class="lbl">화면</span><span class="fb" onclick="P.reset()">↺ 처음부터</span></div>
</div>
<script>
(function(){
  var IC={
    menu:'<svg class="i" viewBox="0 0 24 24"><path d="M0 3H24V5.5H0V3Z"/><path d="M0 10.75H24V13.25H0V10.75Z"/><path d="M24 18.5H0V21H24V18.5Z"/></svg>',
    reserv:'<svg class="is" viewBox="0 0 24 24"><path d="M8.5 7V1.5M15.5 1.5V7M8.67 11.51L10.82 14L15.38 10.59M3.25 4.25H20.75V19.75H3.25V4.25Z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    navi:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#F9F9F9"/><path d="M13.9 19.72L10.65 14.77L4.83 13.66L4.62 12.59L17.36 4.74L14.97 19.51L13.9 19.72Z" fill="#0074D7"/></svg>',
    navarrow:'<svg viewBox="0 0 24 24"><path d="M15 6V1L24 7.5L15 14V10H14C11.19 10 10 11.39 10 15V23H6V15C6 9.3 8.83 6 14 6H15Z"/></svg>',
    person:'<svg viewBox="0 0 28 28"><path fill-rule="evenodd" clip-rule="evenodd" d="M14 28C21.732 28 28 21.732 28 14C28 6.26801 21.732 0 14 0C6.26801 0 0 6.26801 0 14C0 21.732 6.26801 28 14 28ZM16.8039 9.18737C16.8039 10.879 15.4785 12.2497 13.844 12.2497C12.2095 12.2497 10.8842 10.879 10.8842 9.18737C10.8842 7.49578 12.2095 6.125 13.844 6.125C15.4785 6.125 16.8039 7.49578 16.8039 9.18737ZM7 20.125L7.56467 14.5591C7.56467 14.5591 14.1575 13.8218 20.5613 14.4926L21 20.0573L7 20.125Z" fill="#C2CADB"/></svg>',
    phone:'<svg class="i" viewBox="0 0 28 28"><path d="M17.83 17.9L17.19 21.8C17.19 21.8 13.98 20.52 11.44 17.25C8.91 13.98 7.61 9.45 7.61 9.45L11.44 8.8V1H2.5V9.21C2.5 9.8 2.58 10.39 2.77 10.94C3.34 12.62 4.85 16.5 7.61 19.85C9.81 22.52 12.15 24.57 13.66 25.78C14.69 26.61 15.98 27 17.3 27H25.5V17.9H17.83Z"/></svg>',
    next:'<svg class="i" viewBox="0 0 10 16"><path d="M0.625 1.78L7.33 7.89L0.74 13.9L2.07 15.11L9.99 7.89L1.95 0.57L0.625 1.78Z"/></svg>'
  };
  var NAV=IC.navarrow;
  function pinSVG(label,fill,tc){var fs=(label==='✓')?19:(label.length>=3?11:13);return '<svg class="mk" viewBox="0 0 50 52"><ellipse cx="25" cy="46" rx="14" ry="4.5" fill="#0a1024" opacity="0.22"/><path d="M4 0.5H46C47.933 0.5 49.5 2.067 49.5 4V27C49.5 28.933 47.933 30.5 46 30.5H26V45C26 45.55 25.55 46 25 46C24.45 46 24 45.55 24 45V30.5H4C2.067 30.5 0.5 28.933 0.5 27V4C0.5 2.067 2.067 0.5 4 0.5Z" fill="'+fill+'" stroke="rgba(0,0,0,.14)"/><text x="25" y="15.8" text-anchor="middle" dominant-baseline="central" font-family="SpoqaHanSans,sans-serif" font-weight="700" font-size="'+fs+'" fill="'+tc+'">'+label+'</text></svg>';}
  function pinFor(i){var s=stops[i],fill,label;if(isDone(i)){fill='#2E7D52';label='✓';}else if(s.t==='origin'){fill='#0074D7';label='출발';}else if(s.t==='dest'){fill='#FE4C00';label='도착';}else if(i===nextArmed()){fill='#0074D7';label='경유'+s.n;}else{fill='#556895';label='경유'+s.n;}return pinSVG(label,fill,'#fff');}
  function carSVG(){return '<svg class="carsvg" viewBox="0 0 26 34"><ellipse cx="13" cy="30.5" rx="8.5" ry="2.8" fill="#0a1024" opacity="0.2"/><rect x="3.5" y="1.5" width="19" height="29" rx="7.5" fill="#fff" stroke="rgba(0,0,0,.15)"/><path d="M6.6 10.6C10.4 8.5 15.6 8.5 19.4 10.6L18.3 15C15 13.5 11 13.5 7.7 15L6.6 10.6Z" fill="#26365F"/><rect x="7.6" y="18" width="10.8" height="8.5" rx="2.5" fill="#3C4E77"/></svg>';}
  var origin={t:'origin',name:'위워크 삼성역점',addr:'서울 강남구 청담동 92-18',short:'삼성역'};
  var dest={t:'dest',name:'뚝섬역 1번 출구',addr:'서울 성동구 성수동1가 685',short:'뚝섬역'};
  var POOL=[
    {name:'AUCOMMERCE',addr:'서울 성동구 성수동 2가 301-94',short:'AUCOMMERCE'},
    {name:'성수역 4번 출구',addr:'서울 성동구 성수동 1가',short:'성수역'},
    {name:'갤러리아 포레',addr:'서울 성동구 성수동1가 685',short:'갤러리아'},
    {name:'아크로 서울포레스트',addr:'서울 성동구 성수동1가 547',short:'아크로'},
    {name:'성수연방',addr:'서울 성동구 성수동2가 333-13',short:'성수연방'}
  ];
  var stops,PCT,WAYS,S;
  function build(n){WAYS=n;stops=[origin];for(var i=0;i<n;i++){var p=POOL[i];stops.push({t:'way',n:i+1,name:p.name,addr:p.addr,short:p.short})}stops.push(dest);var K=stops.length;PCT=[];for(var i=0;i<K;i++){var t=(K<=1)?0:i/(K-1);PCT.push([Math.round(14+(88-14)*t),Math.round(64-(64-16)*t)])}}
  function resetState(){S={screen:'pickup',pphase:'go',phase:'go',done:[],uncertain:[],target:null,lastAt:0,confirm:null,busy:false,_last:''}}
  function isDone(i){return S.done.indexOf(i)>-1}
  function isUnc(i){return S.uncertain.indexOf(i)>-1}
  function nextArmed(){for(var i=1;i<stops.length;i++){if(!isDone(i)&&!isUnc(i))return i}return stops.length-1}
  function bt(s){return s.t==='origin'?'출발':s.t==='dest'?'도착':('경유'+s.n)}
  function bcls(s){return s.t==='origin'?'org':s.t==='dest'?'dest':'way'}
  function routePath(){var d='M'+PCT[0][0]+' '+PCT[0][1];for(var i=1;i<PCT.length;i++)d+=' L'+PCT[i][0]+' '+PCT[i][1];return d}
  function mapBg(){return '<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%"><rect width="100" height="100" fill="#E7ECF0"/><rect x="0" y="30" width="100" height="7" fill="#fff" opacity="0.85"/><rect x="44" y="0" width="5" height="100" fill="#fff" opacity="0.8"/><rect x="10" y="40" width="26" height="18" fill="#DCEAD7" opacity="0.7"/><path d="'+routePath()+'" stroke="#2E7CE0" stroke-width="5" vector-effect="non-scaling-stroke" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/></svg>'}
  function sb(){return '<div class="sb"><span>12:45</span><span>· · · ·  100%</span></div>'}
  function appbar(resv){var r=(resv===false)?'':'<span class="achip">'+IC.reserv+'예약콜</span>';return '<div class="appbar"><div class="mbtn">'+IC.menu+'</div><div class="abr">'+r+'<span class="achip lm"><span class="ld"></span> 미리배차 켜짐</span></div></div>'}
  function passenger(){return '<div class="pinfo"><div class="pcard"><div class="prow"><span class="pav">'+IC.person+'</span><span class="pnm">김지혜</span><span class="pcall">'+IC.phone+'</span></div><div class="preq">고객 요청사항 보기 <span class="chev">'+IC.next+'</span></div></div></div>'}
  function dotc(i){return '<div class="pin" style="left:'+PCT[i][0]+'%;top:'+PCT[i][1]+'%">'+pinFor(i)+'</div>'}
  function markers(){var h='';for(var i=0;i<stops.length;i++)h+=dotc(i);h+='<div class="car" style="left:'+PCT[S.lastAt][0]+'%;top:'+PCT[S.lastAt][1]+'%">'+carSVG()+'</div>';return h}
  function bubbles(pay){var h='';if(pay)h+='<div class="bub pay"><div class="bin">결제</div></div>';h+='<div class="bub grad">예약</div><div class="bub chg">경로<br>변경</div><div class="bub nav">'+IC.navi+'<span>내비</span></div>';return '<div class="bubs">'+h+'</div>'}
  function cardHTML(s,o){var nav=o.nav?'<span class="cnav" onclick="'+o.navClick+'">'+NAV+'</span>':'';return '<div class="crd"><div class="crd-top"><span class="badge '+bcls(s)+'">'+bt(s)+'</span><div class="cinfo"><div class="cname">'+s.name+'</div><div class="caddr">'+s.addr+'</div></div>'+nav+'</div><div class="cbtn '+o.btnCls+'" onclick="'+o.btnClick+'">'+o.label+'</div></div>'}
  function goCard(i){return cardHTML(stops[i],{btnCls:'go',label:'경로 안내받기',btnClick:'P.startNav()',nav:false})}
  function irow(i,navOn){var s=stops[i];return '<div class="irow tap" onclick="P.askGo('+i+')"><span class="badge '+bcls(s)+'">'+bt(s)+'</span><div class="nm">'+s.name+'</div><span class="rnav'+(navOn?' on':'')+'">'+NAV+'</span></div>'}
  function shell(mapInner,bottomInner,resv){return sb()+appbar(resv)+'<div class="body"><div class="map">'+mapInner+'</div><div class="bottom">'+bottomInner+'</div></div>'}
  function pickup(){var s=stops[0];var go=(S.pphase==='go');var hdr=go?'출발하기':'출발지로 이동 중';var c=cardHTML(s,go?{btnCls:'go',label:'고객 위치로 출발하기',btnClick:'P.goPickupNav()',nav:false}:{btnCls:'done',label:'고객에게 도착 알리기',btnClick:'P.notifyArrived()',nav:true,navClick:'P.goPickupNav()'});var mapInner=mapBg()+'<div class="pin" style="left:60%;top:26%">'+pinSVG('출발','#0074D7','#fff')+'</div><div class="car" style="left:33%;top:54%">'+carSVG()+'</div>'+bubbles(false);var route='<div class="route"><div class="rhd"><span class="t">'+hdr+'</span></div><div class="plist">'+c+'</div></div>';return shell(mapInner,passenger()+route,false)}
  function ptmap(){return sb()+'<div class="tnav"><span class="tn-a">⤴</span><div><div class="tn-d">320m</div><div class="tn-r">'+stops[0].short+' 방면</div></div><span class="tn-t">T map</span></div><div class="tmapmap">'+mapBg()+'<div class="pin" style="left:70%;top:20%">'+pinSVG('출발','#0074D7','#fff')+'</div><div class="car" style="left:20%;top:64%">'+carSVG()+'</div><div class="ttip">'+stops[0].name+' 도착 → <b>타다</b> 복귀</div><div class="tovr"><span class="tob">경로<br>변경</span><span class="tob tada" onclick="P.backPickup()">↩<br>타다</span></div></div><div class="tbar"><span>1.2km · 오후 3:52</span><span>✕</span></div>'}
  function preview(){var rows='';for(var i=0;i<stops.length;i++){rows+=irow(i,i===0)}var mapInner=mapBg()+markers()+bubbles(false);var route='<div class="route"><div class="rhd"><span class="t">남은 경로 '+(WAYS+1)+'개</span></div><div class="plist">'+rows+'</div><div class="barfull" onclick="P.start()">운행 시작하기</div></div>';return shell(mapInner,passenger()+route)}
  function driveRoute(){var cur=nextArmed();var rem=stops.length-cur;var go=(S.phase==='go');var s=stops[cur];var dest=(s.t==='dest');var c;if(go){c=goCard(cur)}else{c=cardHTML(s,{btnCls:'done',label:dest?'요금 결제하기':'도착 완료',btnClick:dest?'P.pay()':'P.complete()',nav:true,navClick:'P.startNav()'})}var up='';for(var i=cur+1;i<stops.length;i++)up+=irow(i,false);return '<div class="route"><div class="rhd"><span class="t">남은 경로 '+rem+'개</span><span class="see" onclick="P.full()">전체 보기 ›</span></div><div class="plist">'+c+up+'</div></div>'}
  function drive(){var mapInner=mapBg()+markers()+bubbles(true);return shell(mapInner,passenger()+driveRoute())}
  function full(){var rows='';for(var i=0;i<stops.length;i++){var s=stops[i],done=(i===0)||isDone(i),unc=isUnc(i),cur=(i===nextArmed()&&!done&&!unc);var right=done?'<span style="color:#7fd6a0;font-size:calc(16px*var(--fs,1));font-weight:700;white-space:nowrap">✓ 완료</span>':(unc?'<span style="color:#f2a33c;font-size:calc(15px*var(--fs,1));font-weight:700;white-space:nowrap">? 미확인</span>':'<span class="rnav on" onclick="P.askGo('+i+')">'+NAV+'</span>');rows+='<div class="irow"><span class="badge '+bcls(s)+'">'+bt(s)+'</span><div class="nm" style="color:'+(done?'var(--dim)':'#fff')+'">'+s.name+'</div>'+right+'</div>'}var dn=S.done.length+1,uc=S.uncertain.length;return sb()+'<div class="full"><div class="fhd"><span onclick="P.closeFull()" style="cursor:pointer">← 전체 경로</span><span style="font-size:calc(13px*var(--fs,1));color:var(--dim)">경유 '+WAYS+'</span></div><div class="fsum"><div class="fsc"><div class="n">'+stops.length+'</div><div class="l">전체</div></div><div class="fsc done"><div class="n">'+dn+'</div><div class="l">도착 완료</div></div><div class="fsc unc"><div class="n">'+uc+'</div><div class="l">미확인</div></div></div><div class="plist" style="flex:1">'+rows+'</div></div>'}
  function tmap(){var s=stops[S.target];return sb()+'<div class="tnav"><span class="tn-a">⤴</span><div><div class="tn-d">137m</div><div class="tn-r">'+s.short+' 방면</div></div><span class="tn-t">T map</span></div><div class="tmapmap">'+mapBg()+markers()+'<div class="ttip">'+s.name+' 도착 → <b>타다</b> 복귀</div><div class="tovr"><span class="tob">경로<br>변경</span><span class="tob tada" onclick="P.backTmap()">↩<br>타다</span></div></div><div class="tbar"><span>4.1km · 오후 4:07</span><span>✕</span></div>'}
  function pay(){return sb()+'<div class="paywrap"><div class="payhd">← 최종 요금 결제</div><div class="payrow"><span>운행요금</span><b>24,600원</b></div><div class="payrow"><span>통행료</span><b>+0원</b></div><div class="paywarn">⚠ 절대 카드/현금을 직접 받지 마세요.</div></div><div class="barfull" onclick="P.finish()">24,600원 결제하기</div>'}
  function done(){return sb()+'<div class="donew"><div class="dok">✓ 결제 완료</div><div class="dbig">운행 완료</div><div class="dsub">8초 뒤 콜 수신이 자동 진행됩니다.</div><div class="dcirc">콜 바로<br>수신하기</div><div class="drest" onclick="P.reset()">↺ 처음부터 다시</div></div>'}
  function cov(){var i=S.confirm,s=stops[i];return '<div class="cov"><div class="cbox"><div class="ctit">'+bt(s)+' '+s.name+'(으)로<br>먼저 가시겠어요?</div><div class="cdsc">사이 경유지는 <b>도착 미확인</b>으로 둘게요.</div><div class="cbs"><div class="cb no" onclick="P.confirmNo()">아니요</div><div class="cb yes" onclick="P.confirmYes()">네, 안내</div></div></div></div>'}
  function html(){return S.screen==='pickup'?pickup():S.screen==='ptmap'?ptmap():S.screen==='preview'?preview():S.screen==='drive'?drive():S.screen==='full'?full():S.screen==='tmap'?tmap():S.screen==='pay'?pay():done()}
  function render(){var h=html();if(S.confirm!=null)h+=cov();var app=document.getElementById('app');var ch=(S._last!==S.screen);app.innerHTML=h;if(ch){app.style.transition='none';app.style.opacity='0';void app.offsetWidth;app.style.transition='opacity .2s ease';app.style.opacity='1'}S._last=S.screen}
  function advance(cur){
    var app=document.getElementById('app');var plist=app.querySelector('.plist');
    var oldCard=plist?plist.querySelector('.crd'):null;var oldRow=plist?plist.querySelector('.irow'):null;
    if(!plist||!oldCard||!oldRow){if(S.done.indexOf(cur)<0)S.done.push(cur);S.lastAt=cur;S.phase='go';render();S.busy=false;return}
    var E='cubic-bezier(.3,0,0,1)';
    var obtn=oldCard.querySelector('.cbtn');if(obtn){obtn.className='cbtn ok';obtn.textContent='✓ 도착 완료'}
    oldCard.style.overflow='hidden';oldCard.style.maxHeight=oldCard.offsetHeight+'px';
    setTimeout(function(){
      oldCard.style.transition='opacity .32s ease,transform .38s '+E;oldCard.style.opacity='0';oldCard.style.transform='translateY(-14px)';
    },70);
    setTimeout(function(){
      if(S.done.indexOf(cur)<0)S.done.push(cur);S.lastAt=cur;S.phase='go';
      var ncur=nextArmed();
      var holder=document.createElement('div');holder.innerHTML=goCard(ncur);var nextCard=holder.firstChild;
      plist.insertBefore(nextCard,oldRow);
      var H_full=nextCard.offsetHeight;var H_row=oldRow.offsetHeight;
      nextCard.style.overflow='hidden';nextCard.style.maxHeight=H_row+'px';nextCard.style.borderColor='transparent';
      var nm=nextCard.querySelector('.cname');if(nm){nm.style.transformOrigin='left center';nm.style.transform='scale(.769)';nm.style.color='var(--dim)'}
      var ad=nextCard.querySelector('.caddr');if(ad)ad.style.opacity='0';
      var btn=nextCard.querySelector('.cbtn');if(btn)btn.style.opacity='0';
      oldRow.style.display='none';
      var cel=app.querySelector('.rhd .t');if(cel)cel.textContent='남은 경로 '+(stops.length-ncur)+'개';
      void app.offsetWidth;
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        oldCard.style.transition='max-height .46s '+E;oldCard.style.maxHeight='0px';
        nextCard.style.transition='max-height .46s '+E+',border-color .4s ease .05s';nextCard.style.maxHeight=H_full+'px';nextCard.style.borderColor='var(--bd)';
        if(nm){nm.style.transition='transform .44s '+E+',color .4s ease';nm.style.transform='scale(1)';nm.style.color='#fff'}
        if(ad){ad.style.transition='opacity .32s ease .12s';ad.style.opacity='1'}
        if(btn){btn.style.transition='opacity .34s ease .22s';btn.style.opacity='1'}
        setTimeout(function(){render();S.busy=false},500);
      })});
    },350);
  }
  function screenLayer(html){var d=document.createElement('div');d.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:var(--navy);will-change:transform';d.innerHTML=html;return d}
  function appOpen(foreHtml,after){
    S.busy=true;var ph=document.getElementById('ph'),app=document.getElementById('app');
    var sw=document.createElement('div');sw.style.cssText='position:absolute;inset:0;z-index:25;overflow:hidden;background:#000';
    var bw=document.createElement('div');bw.style.cssText='position:absolute;inset:0;transform-origin:50% 50%;overflow:hidden;z-index:1';
    var back=screenLayer(app.innerHTML);bw.appendChild(back);
    var scr=document.createElement('div');scr.style.cssText='position:absolute;inset:0;background:#000;opacity:0;z-index:2;pointer-events:none';bw.appendChild(scr);
    var fore=screenLayer(foreHtml);fore.style.transform='translateX(100%)';fore.style.zIndex='3';fore.style.boxShadow='-16px 0 46px rgba(0,0,0,.55)';
    sw.appendChild(bw);sw.appendChild(fore);ph.appendChild(sw);
    requestAnimationFrame(function(){requestAnimationFrame(function(){var E='cubic-bezier(.2,0,0,1)';bw.style.transition='transform .42s '+E+',border-radius .42s '+E;bw.style.transform='translateX(-16%) scale(.9)';bw.style.borderRadius='24px';scr.style.transition='opacity .42s';scr.style.opacity='.46';fore.style.transition='transform .42s '+E;fore.style.transform='translateX(0)';setTimeout(function(){if(after)after();if(sw.parentNode)sw.parentNode.removeChild(sw);S.busy=false},440)})});
  }
  function appClose(backHtml,after){
    S.busy=true;var ph=document.getElementById('ph'),app=document.getElementById('app');
    var sw=document.createElement('div');sw.style.cssText='position:absolute;inset:0;z-index:25;overflow:hidden;background:#000';
    var bw=document.createElement('div');bw.style.cssText='position:absolute;inset:0;transform-origin:50% 50%;overflow:hidden;z-index:1;transform:translateX(-16%) scale(.9);border-radius:24px';
    var back=screenLayer(backHtml);bw.appendChild(back);
    var scr=document.createElement('div');scr.style.cssText='position:absolute;inset:0;background:#000;opacity:.46;z-index:2;pointer-events:none';bw.appendChild(scr);
    var fore=screenLayer(app.innerHTML);fore.style.transform='translateX(0)';fore.style.zIndex='3';fore.style.boxShadow='-16px 0 46px rgba(0,0,0,.55)';
    sw.appendChild(bw);sw.appendChild(fore);ph.appendChild(sw);
    requestAnimationFrame(function(){requestAnimationFrame(function(){var E='cubic-bezier(.2,0,0,1)';bw.style.transition='transform .44s '+E+',border-radius .44s '+E;bw.style.transform='translateX(0) scale(1)';bw.style.borderRadius='0px';scr.style.transition='opacity .44s';scr.style.opacity='0';fore.style.transition='transform .44s '+E;fore.style.transform='translateX(100%)';setTimeout(function(){if(after)after();if(sw.parentNode)sw.parentNode.removeChild(sw);S.busy=false},460)})});
  }
  window.P={
    setFont:function(v,el){document.getElementById('ph').style.setProperty('--fs',v);var b=el.parentNode.querySelectorAll('.fb');for(var i=0;i<b.length;i++)b[i].classList.remove('on');el.classList.add('on')},
    setWays:function(n,el){build(n);resetState();var b=el.parentNode.querySelectorAll('.fb');for(var i=0;i<b.length;i++)b[i].classList.remove('on');el.classList.add('on');render()},
    goPickupNav:function(){if(S.busy)return;appOpen(ptmap(),function(){S.screen='ptmap';S._last='ptmap';render()})},
    backPickup:function(){if(S.busy)return;S.pphase='arrived';appClose(pickup(),function(){S.screen='pickup';S._last='pickup';render()})},
    notifyArrived:function(){S.screen='preview';render()},
    start:function(){S.phase='go';S.screen='drive';render()},
    startNav:function(){if(S.busy)return;S.target=nextArmed();appOpen(tmap(),function(){S.screen='tmap';S._last='tmap';render()})},
    backTmap:function(){if(S.busy)return;S.lastAt=S.target;S.phase='arrived';appClose(drive(),function(){S.screen='drive';S._last='drive';render()})},
    complete:function(){if(S.busy)return;var cur=nextArmed();S.busy=true;advance(cur)},
    pay:function(){S.screen='pay';render()},
    full:function(){S.screen='full';render()},
    closeFull:function(){S.screen='drive';render()},
    askGo:function(i){if(S.busy)return;var a=nextArmed();if(i>a){P.toast('아직 안내할 수 없습니다');return}S.target=i;appOpen(tmap(),function(){S.screen='tmap';S._last='tmap';render()})},
    confirmNo:function(){S.confirm=null;render()},
    confirmYes:function(){var i=S.confirm;S.confirm=null;var a=nextArmed();if(i>a){for(var j=a;j<i;j++){if(stops[j].t==='way'&&!isDone(j)&&!isUnc(j))S.uncertain.push(j)}}S.target=i;appOpen(tmap(),function(){S.screen='tmap';S._last='tmap';render()})},
    finish:function(){S.screen='done';render()},
    toast:function(msg){var ph=document.getElementById('ph');var old=document.getElementById('toast');if(old&&old.parentNode)old.parentNode.removeChild(old);var t=document.createElement('div');t.id='toast';t.className='toast';t.textContent=msg;ph.appendChild(t);requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('on')})});clearTimeout(P._tt);P._tt=setTimeout(function(){t.classList.remove('on');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},260)},1700)},
    reset:function(){resetState();render()}
  };
  build(3);resetState();render();
})();
</script>
<script>
(function(){var p=document.getElementById('devpanel'),s=document.getElementById('devscrim');function t(){var o=!p.classList.contains('open');p.classList.toggle('open',o);s.classList.toggle('open',o);}document.getElementById('devbtn').addEventListener('click',t);document.getElementById('devx').addEventListener('click',t);s.addEventListener('click',t);})();
</script>
